version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:6.2-php8.1-apache
    depends_on:
      - db
    ports:
      - "8000:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - ./plugin/elementor-divi5-converter:/var/www/html/wp-content/plugins/elementor-divi5-converter:delegated
      - ./references/Divi:/var/www/html/wp-content/themes/Divi:delegated
      - ./references/elementor4.1.3.zip:/tmp/elementor4.1.3.zip:ro
      - ./fixtures:/var/www/html/fixtures:ro
      - wp_uploads:/var/www/html/wp-content/uploads
    # The WordPress image entrypoint (docker-entrypoint.sh) runs WP setup, then
    # calls exec "$@". We override CMD so the final step fixes uploads ownership
    # (created as root during setup) before handing off to Apache.
    command: >
      bash -c "
        mkdir -p /var/www/html/wp-content/uploads &&
        chown -R www-data:www-data /var/www/html/wp-content/uploads &&
        mkdir -p /var/www/html/wp-content/et-cache &&
        chown -R www-data:www-data /var/www/html/wp-content/et-cache &&
        exec apache2-foreground
      "

volumes:
  db_data:
  wp_uploads:
