version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:6.2-php8.1-apache
    depends_on:
      - db
    ports:
      - "8000:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - ./plugin/elementor-divi5-converter:/var/www/html/wp-content/plugins/elementor-divi5-converter:delegated
      - ./references/Divi:/var/www/html/wp-content/themes/Divi:delegated
      - ./references/elementor4.1.3.zip:/tmp/elementor4.1.3.zip:ro
      - ./fixtures:/var/www/html/fixtures:ro

volumes:
  db_data:
